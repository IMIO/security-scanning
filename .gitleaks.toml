title = "IMIO Gitleaks Config"

[extend]
useDefault = true

[allowlist]
description = "IMIO global allowlist"
regexes = [
  '''(?i)password\s*=\s*(secret|changeme|example|test|todo|xxx|placeholder)''',
  '''vault:secret/''',
]
paths = [
  '''(^|/)tests?/.*\.(py|cfg|json|yml|yaml)$''',
  '''(^|/)(example|sample|demo|docs?)/''',
  '''\.cfg\.example$''',
]
