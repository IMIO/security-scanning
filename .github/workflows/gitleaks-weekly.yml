name: Gitleaks Weekly Org Scan

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | jq -r .tag_name | tr -d v)
          wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -O /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run org-wide Gitleaks scan
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_SCAN_TOKEN }}
        run: |
          chmod +x scan-org.sh
          ./scan-org.sh

      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-org-report-${{ github.run_id }}
          path: reports/
          retention-days: 30
